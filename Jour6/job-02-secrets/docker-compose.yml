services:
  api:
    build: ./api
    ports:
      - "8080:80"
    secrets:
      - db_password
      - db_user
    environment:
      - DB_HOST=mysql
      - DB_NAME=myapp
      - DB_USER_FILE=/run/secrets/db_user
      - DB_PASSWORD_FILE=/run/secrets/db_password
    # Bug : il manque quelque chose pour attendre MySQL 🐛
    # 🐛 BUG CORRIGÉ ICI : L'API attend que le healthcheck de MySQL soit validé
    depends_on:
      mysql:
        condition: service_healthy



  mysql:
    image: mysql:8
    secrets:
      - db_password
      - db_user
      - mysql_root
    environment:
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/mysql_root
      - MYSQL_DATABASE=myapp
      - MYSQL_USER_FILE=/run/secrets/db_user
      - MYSQL_PASSWORD_FILE=/run/secrets/db_password
    volumes:
      - mysql_data:/var/lib/mysql

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_user:
    file: ./secrets/db_user.txt
  mysql_root:
    file: ./secrets/mysql_root.txt

volumes:
  mysql_data: